name: Build & Deploy to TestFlight

on:
  push:
    branches: [main, 'claude/**']
  workflow_dispatch:

# Required GitHub Secrets (for TestFlight upload only):
#   ASC_KEY_ID      - App Store Connect API Key ID
#   ASC_ISSUER_ID   - App Store Connect Issuer ID
#   ASC_KEY_BASE64  - Base64 of AuthKey_<ID>.p8
#
# Signing certs & profiles are pre-installed on the self-hosted runner.

jobs:
  build:
    runs-on: [self-hosted, macOS]
    steps:
      - uses: actions/checkout@v4

      - name: Download LibXray.xcframework
        run: |
          if [ ! -d "LibXray.xcframework" ] || [ ! -d "LibXray.xcframework/ios-arm64" ]; then
            curl -L -o LibXray.xcframework.zip \
              https://github.com/truvvor/Xray-core/releases/download/v1.0.0-ios/LibXray.xcframework.zip
            unzip -qo LibXray.xcframework.zip
          fi

      - name: Install XcodeGen
        run: which xcodegen || brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build archive
        run: |
          xcodebuild archive \
            -project AntiDPIVPN.xcodeproj \
            -scheme AntiDPIVPN \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $RUNNER_TEMP/AntiDPIVPN.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=WJWU38ALPB \
            -allowProvisioningUpdates

      - name: Setup App Store Connect API key
        env:
          ASC_KEY_BASE64: ${{ secrets.ASC_KEY_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          mkdir -p ~/private_keys
          echo -n "$ASC_KEY_BASE64" | base64 --decode > ~/private_keys/AuthKey_${ASC_KEY_ID}.p8

      - name: Export & Upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          cat > /tmp/ExportOptions.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>teamID</key>
              <string>WJWU38ALPB</string>
              <key>destination</key>
              <string>upload</string>
              <key>signingStyle</key>
              <string>automatic</string>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/AntiDPIVPN.xcarchive \
            -exportPath $RUNNER_TEMP/export \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

          echo "Successfully exported and uploaded to TestFlight!"

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: AntiDPIVPN-build-${{ github.run_number }}
          path: ${{ runner.temp }}/export/*.ipa

      - name: Cleanup
        if: always()
        run: rm -f ~/private_keys/AuthKey_*.p8 2>/dev/null || true
