name: Build & Upload to TestFlight

on:
  push:
    branches: [main, 'claude/**']
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Libbox.xcframework
        run: |
          if [ ! -d "Libbox.xcframework" ] || [ ! -d "Libbox.xcframework/ios-arm64" ]; then
            curl -L -o Libbox.xcframework.zip \
              https://github.com/EbrahimTahernejad/sing-box-lib/releases/download/1.11.11/Libbox.xcframework.zip
            unzip -qo Libbox.xcframework.zip
          fi

          # Convert macOS deep bundle to iOS shallow bundle for ios-arm64
          FW="Libbox.xcframework/ios-arm64/Libbox.framework"
          if [ -d "$FW/Versions" ]; then
            echo "Converting deep bundle to shallow bundle..."
            # Save files from deep structure
            cp -R "$FW/Versions/A/Headers" "$FW/Headers_tmp"
            cp -R "$FW/Versions/A/Modules" "$FW/Modules_tmp"
            cp "$FW/Versions/A/Resources/Info.plist" "$FW/Info_tmp.plist"
            if [ -f "$FW/Versions/A/Libbox" ]; then
              cp "$FW/Versions/A/Libbox" "$FW/Libbox_tmp"
            fi
            # Remove deep structure and symlinks
            rm -rf "$FW/Versions" "$FW/Headers" "$FW/Modules" "$FW/Resources" "$FW/Libbox"
            # Restore as flat structure
            mv "$FW/Headers_tmp" "$FW/Headers"
            mv "$FW/Modules_tmp" "$FW/Modules"
            mv "$FW/Info_tmp.plist" "$FW/Info.plist"
            if [ -f "$FW/Libbox_tmp" ]; then
              mv "$FW/Libbox_tmp" "$FW/Libbox"
            fi
            echo "Shallow bundle structure:"
            ls -la "$FW/"
          fi

      - name: Generate Xcode project
        run: |
          which xcodegen || brew install xcodegen
          xcodegen generate

      - name: Build and Upload
        env:
          RUNNER_TEMP: ${{ runner.temp }}
        run: |
          set -e

          # Keychain setup
          security list-keychains -d user -s ~/Library/Keychains/login.keychain-db /Library/Keychains/System.keychain
          security unlock-keychain -p 'rentamac' ~/Library/Keychains/login.keychain-db
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k 'rentamac' ~/Library/Keychains/login.keychain-db >/dev/null 2>&1
          security set-keychain-settings -lut 21600 ~/Library/Keychains/login.keychain-db
          echo "=== Signing identities ==="
          security find-identity -v -p codesigning

          # Archive
          xcodebuild -scheme AntiDPIVPN \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $RUNNER_TEMP/AntiDPIVPN.xcarchive \
            archive \
            -allowProvisioningUpdates \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=WJWU38ALPB

          # Create ExportOptions
          printf '<?xml version="1.0" encoding="UTF-8"?>\n<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">\n<plist version="1.0">\n<dict>\n  <key>method</key>\n  <string>app-store-connect</string>\n  <key>uploadSymbols</key>\n  <false/>\n  <key>signingStyle</key>\n  <string>automatic</string>\n  <key>teamID</key>\n  <string>WJWU38ALPB</string>\n</dict>\n</plist>\n' > $RUNNER_TEMP/ExportOptions.plist

          # Export IPA
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/AntiDPIVPN.xcarchive \
            -exportPath $RUNNER_TEMP/export \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -allowProvisioningUpdates

          # Upload to TestFlight
          xcrun altool --upload-app \
            -f $RUNNER_TEMP/export/AntiDPIVPN.ipa \
            -t ios \
            --apiKey 4RA5988Z6S \
            --apiIssuer e51df9f1-5d4a-4eb9-83e1-a8d49966cdfc

      - name: Cleanup
        if: always()
        run: |
          rm -rf ${{ runner.temp }}/AntiDPIVPN.xcarchive
          rm -rf ${{ runner.temp }}/export
          rm -f ${{ runner.temp }}/ExportOptions.plist
