name: Build & Upload to TestFlight

on:
  push:
    branches: [main, claude/reduce-memory-usage-BwFrG]
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout
        run: |
          cd "$GITHUB_WORKSPACE"
          git init 2>/dev/null || true
          git remote set-url origin "https://github.com/$GITHUB_REPOSITORY.git" 2>/dev/null || git remote add origin "https://github.com/$GITHUB_REPOSITORY.git"
          git fetch --depth 1 origin "$GITHUB_SHA"
          git checkout -f "$GITHUB_SHA"
          echo "Checked out $(git rev-parse --short HEAD) on $GITHUB_REF"

      - name: Build and Upload
        run: |
          set -e

          # Keychain setup
          security list-keychains -d user -s ~/Library/Keychains/login.keychain-db /Library/Keychains/System.keychain
          security unlock-keychain -p 'rentamac' ~/Library/Keychains/login.keychain-db
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k 'rentamac' ~/Library/Keychains/login.keychain-db >/dev/null 2>&1
          security set-keychain-settings -lut 21600 ~/Library/Keychains/login.keychain-db
          echo "=== Signing identities ==="
          security find-identity -v -p codesigning

          KEYCHAIN_PATH="$HOME/Library/Keychains/login.keychain-db"

          # Archive
          xcodebuild -scheme AntiDPIVPN \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $RUNNER_TEMP/AntiDPIVPN.xcarchive \
            archive \
            -allowProvisioningUpdates \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=WJWU38ALPB \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH"

          # Create ExportOptions plist
          cat > $RUNNER_TEMP/ExportOptions.plist << 'PLISTEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>uploadSymbols</key>
            <false/>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>teamID</key>
            <string>WJWU38ALPB</string>
          </dict>
          </plist>
          PLISTEOF

          echo "ExportOptions.plist created:"
          cat $RUNNER_TEMP/ExportOptions.plist

          # Export IPA
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/AntiDPIVPN.xcarchive \
            -exportPath $RUNNER_TEMP/export \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -allowProvisioningUpdates \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH"

          # Upload to TestFlight
          xcrun altool --upload-app \
            -f $RUNNER_TEMP/export/AntiDPIVPN.ipa \
            -t ios \
            --apiKey 4RA5988Z6S \
            --apiIssuer e51df9f1-5d4a-4eb9-83e1-a8d49966cdfc

      - name: Cleanup
        if: always()
        run: |
          rm -rf ${{ runner.temp }}/AntiDPIVPN.xcarchive
          rm -rf ${{ runner.temp }}/export
          rm -f ${{ runner.temp }}/ExportOptions.plist
