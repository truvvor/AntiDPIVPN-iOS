name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Download LibXray.xcframework
        run: |
          # Download pre-built LibXray from Xray-core release
          curl -L -o LibXray.xcframework.zip https://github.com/truvvor/Xray-core/releases/download/v1.0.0-ios/LibXray.xcframework.zip || true
          if [ -f LibXray.xcframework.zip ]; then
            unzip -q LibXray.xcframework.zip
          fi

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Install signing certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          MAIN_PROVISION_PROFILE_BASE64: ${{ secrets.MAIN_PROVISION_PROFILE_BASE64 }}
          TUNNEL_PROVISION_PROFILE_BASE64: ${{ secrets.TUNNEL_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Create keychain
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          MAIN_PP_PATH=$RUNNER_TEMP/main_pp.mobileprovision
          TUNNEL_PP_PATH=$RUNNER_TEMP/tunnel_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$MAIN_PROVISION_PROFILE_BASE64" | base64 --decode -o $MAIN_PP_PATH
          echo -n "$TUNNEL_PROVISION_PROFILE_BASE64" | base64 --decode -o $TUNNEL_PP_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Download Apple intermediate certs
          curl -sL https://www.apple.com/certificateauthority/AppleWWDRCAG3.cer -o /tmp/AppleWWDRCAG3.cer
          curl -sL https://www.apple.com/certificateauthority/AppleRootCA-G3.cer -o /tmp/AppleRootCA-G3.cer
          security import /tmp/AppleWWDRCAG3.cer -k $KEYCHAIN_PATH -T /usr/bin/codesign
          security import /tmp/AppleRootCA-G3.cer -k $KEYCHAIN_PATH -T /usr/bin/codesign

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $MAIN_PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/main.mobileprovision
          cp $TUNNEL_PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/tunnel.mobileprovision

      - name: Build
        run: |
          xcodebuild -project AntiDPIVPN.xcodeproj             -scheme AntiDPIVPN             -sdk iphoneos             -configuration Release             -derivedDataPath DerivedData             -destination "generic/platform=iOS"             DEVELOPMENT_TEAM=WJWU38ALPB             CODE_SIGN_STYLE=Manual             CODE_SIGN_IDENTITY="Apple Development"             PROVISIONING_PROFILE_SPECIFIER=""             CODE_SIGNING_ALLOWED=YES

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r DerivedData/Build/Products/Release-iphoneos/AntiDPIVPN.app Payload/
          
          # Embed provisioning profiles
          cp $RUNNER_TEMP/main_pp.mobileprovision Payload/AntiDPIVPN.app/embedded.mobileprovision
          if [ -d "Payload/AntiDPIVPN.app/PlugIns/PacketTunnelExtension.appex" ]; then
            cp $RUNNER_TEMP/tunnel_pp.mobileprovision Payload/AntiDPIVPN.app/PlugIns/PacketTunnelExtension.appex/embedded.mobileprovision
          fi
          
          # Re-sign
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          IDENTITY="Apple Development: Vladimir Vorkachev (AS23BV3K8Z)"
          
          # Sign frameworks
          for fw in Payload/AntiDPIVPN.app/Frameworks/*; do
            codesign --force --sign "$IDENTITY" --timestamp=none "$fw" || true
          done
          
          # Extract and use entitlements from profiles
          security cms -D -i $RUNNER_TEMP/tunnel_pp.mobileprovision > /tmp/tunnel_profile.plist
          /usr/libexec/PlistBuddy -x -c "Print :Entitlements" /tmp/tunnel_profile.plist > /tmp/tunnel_ent.plist
          security cms -D -i $RUNNER_TEMP/main_pp.mobileprovision > /tmp/main_profile.plist
          /usr/libexec/PlistBuddy -x -c "Print :Entitlements" /tmp/main_profile.plist > /tmp/main_ent.plist
          
          # Sign extension
          codesign --force --sign "$IDENTITY" --entitlements /tmp/tunnel_ent.plist --timestamp=none             Payload/AntiDPIVPN.app/PlugIns/PacketTunnelExtension.appex
          
          # Sign main app
          codesign --force --sign "$IDENTITY" --entitlements /tmp/main_ent.plist --timestamp=none             Payload/AntiDPIVPN.app
          
          zip -qr AntiDPIVPN-signed.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: AntiDPIVPN-signed
          path: AntiDPIVPN-signed.ipa
