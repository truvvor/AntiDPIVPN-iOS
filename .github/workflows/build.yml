name: Build & Upload to TestFlight

on:
  push:
    branches: [main, claude/reduce-memory-usage-BwFrG, claude/review-project-structure-YAZJR]
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and Upload
        env:
          RUNNER_TEMP: ${{ runner.temp }}
        run: |
          set -e

          # Keychain setup
          security list-keychains -d user -s ~/Library/Keychains/login.keychain-db /Library/Keychains/System.keychain
          security unlock-keychain -p 'rentamac' ~/Library/Keychains/login.keychain-db
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k 'rentamac' ~/Library/Keychains/login.keychain-db >/dev/null 2>&1
          security set-keychain-settings -lut 21600 ~/Library/Keychains/login.keychain-db
          echo "=== Signing identities ==="
          security find-identity -v -p codesigning

          # Regenerate project.pbxproj from project.yml so new source files
          # dropped into the source group directories are picked up on every
          # build (XcodeGen source group: type=group).
          if ! command -v xcodegen >/dev/null 2>&1; then
            echo "xcodegen not found on runner; install via 'brew install xcodegen'"
            exit 1
          fi
          xcodegen generate --spec project.yml

          # Archive
          xcodebuild -scheme AntiDPIVPN \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $RUNNER_TEMP/AntiDPIVPN.xcarchive \
            archive \
            -allowProvisioningUpdates \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=WJWU38ALPB

          # Create ExportOptions
          printf '<?xml version="1.0" encoding="UTF-8"?>\n<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">\n<plist version="1.0">\n<dict>\n  <key>method</key>\n  <string>app-store-connect</string>\n  <key>uploadSymbols</key>\n  <false/>\n  <key>signingStyle</key>\n  <string>automatic</string>\n  <key>teamID</key>\n  <string>WJWU38ALPB</string>\n</dict>\n</plist>\n' > $RUNNER_TEMP/ExportOptions.plist

          # Export IPA
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/AntiDPIVPN.xcarchive \
            -exportPath $RUNNER_TEMP/export \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -allowProvisioningUpdates

          # Upload to TestFlight
          xcrun altool --upload-app \
            -f $RUNNER_TEMP/export/AntiDPIVPN.ipa \
            -t ios \
            --apiKey 4RA5988Z6S \
            --apiIssuer e51df9f1-5d4a-4eb9-83e1-a8d49966cdfc

          # Stage dSYMs + app binary for artifact upload BEFORE cleanup
          mkdir -p "$RUNNER_TEMP/debug_symbols"
          cp -R "$RUNNER_TEMP/AntiDPIVPN.xcarchive/dSYMs" "$RUNNER_TEMP/debug_symbols/" 2>/dev/null || true
          cp "$RUNNER_TEMP/AntiDPIVPN.xcarchive/Products/Applications/AntiDPIVPN.app/AntiDPIVPN" \
             "$RUNNER_TEMP/debug_symbols/AntiDPIVPN.bin" 2>/dev/null || true
          ls -la "$RUNNER_TEMP/debug_symbols/"

      - name: Upload dSYMs + binary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dsyms-and-binary
          path: ${{ runner.temp }}/debug_symbols
          retention-days: 7
          if-no-files-found: warn

      - name: Cleanup
        if: always()
        run: |
          rm -rf ${{ runner.temp }}/AntiDPIVPN.xcarchive
          rm -rf ${{ runner.temp }}/export
          rm -f ${{ runner.temp }}/ExportOptions.plist

