name: Build & Upload to TestFlight

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Keychain
        run: |
          # Add login keychain to search list (runner service drops it)
          security list-keychains -d user -s ~/Library/Keychains/login.keychain-db /Library/Keychains/System.keychain
          # Unlock it
          security unlock-keychain -p 'rentamac' ~/Library/Keychains/login.keychain-db
          # Allow codesign access without GUI prompt
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k 'rentamac' ~/Library/Keychains/login.keychain-db
          # Keep unlocked for 1 hour
          security set-keychain-settings -t 3600 ~/Library/Keychains/login.keychain-db
          echo "=== Signing identities ==="
          security find-identity -v -p codesigning

      - name: Copy frameworks
        run: |
          # LibXray and HevSocks5Tunnel are in the repo root
          ls -la LibXray.xcframework/ HevSocks5Tunnel.xcframework/ 2>/dev/null || echo "Frameworks check"

      - name: Archive
        run: |
          xcodebuild -scheme AntiDPIVPN \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $RUNNER_TEMP/AntiDPIVPN.xcarchive \
            archive \
            -allowProvisioningUpdates \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=WJWU38ALPB

      - name: Export IPA
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>uploadSymbols</key>
            <false/>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>teamID</key>
            <string>WJWU38ALPB</string>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/AntiDPIVPN.xcarchive \
            -exportPath $RUNNER_TEMP/export \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -allowProvisioningUpdates

      - name: Upload to TestFlight
        run: |
          xcrun altool --upload-app \
            -f $RUNNER_TEMP/export/AntiDPIVPN.ipa \
            -t ios \
            --apiKey ZYQ7S822HR \
            --apiIssuer e51df9f1-5d4a-4eb9-83e1-a8d49966cdfc

      - name: Cleanup
        if: always()
        run: |
          rm -rf $RUNNER_TEMP/AntiDPIVPN.xcarchive
          rm -rf $RUNNER_TEMP/export
          rm -f $RUNNER_TEMP/ExportOptions.plist
